<html>
    <head>
        <title>Agentamento Hirosaki</title>
        <link rel="stylesheet" href="./css/Agendamento.css">
    </head>
    <body>
        <header>
            <h2 style="text-align: center; color: aliceblue;">Agendamento Hirosaki</h2>
        </header>
        <main>
            <section class="card">
                <h2>Agendamento</h2>
                <input type="text" placeholder="Nome">
                <input type="number" placeholder="Número para contato">
                <input type="email" placeholder="E=mail para contato">
                <br>
                <label>
                    <input type="radio" name="contato"> Whatsapp
                    <input type="radio" name="contato"> E-mail 
                </label>
                
                <select class="opcao">
                    <option>Opções de Horário</option>
                    <option>Tarde</option>
                    <option>Noite</option>
                </select>
                <input type="date">
                <input type="time">
                
                <br>
                
                <button type="submit" class="btn" onclick="alert('Marcado com sucesso')"> Marcar </button>
                
            </section>
        </main>
        <footer>
            <div class="barra">
                <a href="./Cadastro.html" class="voltar">Voltar</a>
            </div>

        </footer>
    </body>
</html>
